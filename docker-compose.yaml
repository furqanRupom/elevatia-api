services:
  postgres:
    image: postgres:16-alpine
    container_name: elevatia_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: elevatia
      POSTGRES_PASSWORD: elevatia123
      POSTGRES_DB: elevatia_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elevatia -d elevatia_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local